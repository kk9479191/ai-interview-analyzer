<!DOCTYPE html>
<html>
<head>
    <title>AI Interview</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        video {
            border: 2px solid black;
            margin-top: 20px;
        }

        textarea {
            width: 60%;
            height: 100px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            font-size: 16px;
        }
    </style>

<style id="oabk8c">
.video-container {
    position: relative;
    width: 500px;
    height: 400px;
    margin: auto;
}

video, canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}
</style>
</head>

<body>

<h2>AI Interview</h2>

<!-- 🎥 Camera -->
<div class="video-container">
    <video id="video" width="500" height="400" autoplay muted></video>
</div>
<h2 id="question">Tell me about yourself</h2>
<h3>Emotion: <span id="emotion">Loading...</span></h3>


<!-- 📝 Answer Box -->
<textarea id="answer" placeholder="Type or Speak your answer here..."></textarea>

<br>
<button onclick="startSpeech()">🎤 Speak Answer</button>
<!-- 🚀 Submit Button -->
<button onclick="submitAnswer()">Submit</button>

<script src="/static/js/face-api.min.js"></script>
<script src="/static/js/emotion.js"></script>

<!-- ✅ Submit JS -->


<script>
function submitAnswer() {
    const answer = document.getElementById("answer").value;

    // 🔥 FORCE GET
    let emotion = window.currentEmotion;

    if (!emotion || emotion === "Loading..." || emotion === "No face") {
        emotion = document.getElementById("emotion").innerText;
    }

    if (!emotion) {
        emotion = "neutral";
    }

    console.log("FINAL Emotion:", emotion);

    fetch("/submit", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            answer: answer,
            emotion: emotion
        })
    })
    .then(res => res.json())
    .then(data => {
        window.location.href = "/result";
    });
}
</script>
<script src="/static/js/speech.js"></script>

</body>
</html>
