<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
    <h2 class="text-center">Dashboard</h2>

    <table class="table table-striped table-hover mt-4 shadow">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Question</th>
                <th>Answer</th>
                <th>Score</th>
                <th>Result</th>
            </tr>
        </thead>

        <tbody>
            {% for row in data %}
            <tr>
                <td>{{ row.id }}</td>
                <td>{{ row.name }}</td>
                <td>{{ row.question }}</td>
                <td>{{ row.answer }}</td>
                <td>{{ row.score }}</td>
                <td>{{ row.result }}</td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

    <div class="text-center mt-4">
        <a href="/" class="btn btn-primary">Take Interview Again</a>
    </div>
</div>

<a href="/clear" onclick="return confirm('Are you sure?')">
    <button>Clear Dashboard</button>
</a>

</body>
</html>
