<!DOCTYPE html>
<html>
<head>
    <title>Interview Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }
        .card {
            max-width: 500px;
            margin: 80px auto;
            border-radius: 15px;
        }
        .selected {
            color: green;
            font-weight: bold;
        }
        .rejected {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="card shadow p-4 text-center">

    <h2>Interview Result</h2>

    <h4 class="mt-3">Score</h4>
    <h1>{{ score }}</h1>

    <h4 class="mt-3">Status</h4>

    {% if result == "Selected" %}
        <p class="selected">✅ Selected</p>
    {% else %}
        <p class="rejected">❌ Rejected</p>
    {% endif %}

    <h4>Emotion: {{ emotion if emotion else 'neutral' }}</h4>

    <a href="/dashboard" class="btn btn-dark mt-3">Go to Dashboard</a>

</div>

</body>
</html>
